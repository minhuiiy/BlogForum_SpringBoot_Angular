<div class="editor-container">
  <div class="editor-header">
    <h1 class="gradient-text">Tạo bài viết mới</h1>
    <p>Chia sẻ kiến thức và tin tức của bạn với cộng đồng.</p>
  </div>

  <div class="alert-success" *ngIf="isSuccessful">
    🎉 Đăng bài thành công! Đang chuyển hướng đến bài viết...
  </div>
  <div class="alert-error" *ngIf="isFailed">
    ❌ {{ errorMessage }}
  </div>

  <form name="form" (ngSubmit)="f.form.valid && onSubmit()" #f="ngForm" novalidate *ngIf="!isSuccessful">
    <div class="form-group">
      <label for="title">Tiêu đề bài viết</label>
      <input 
        type="text" 
        id="title" 
        name="title" 
        [(ngModel)]="form.title" 
        required 
        placeholder="Nhập tiêu đề thật hấp dẫn..."
        class="input-title"
      />
    </div>

    <div class="form-group">
      <label for="content">Nội dung</label>
      <textarea 
        id="content" 
        name="content" 
        [(ngModel)]="form.content" 
        required 
        rows="15" 
        placeholder="Bắt đầu viết những điều tuyệt vời nhất..."
        class="input-content"
      ></textarea>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-outline" routerLink="/">Hủy bỏ</button>
      <button type="submit" class="btn-primary">Xuất bản ngay</button>
    </div>
  </form>
</div>
