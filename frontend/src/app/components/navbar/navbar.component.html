<nav class="navbar">
  <div class="nav-container">
    <div class="nav-brand">
      <a routerLink="/" class="brand-link">
        <span class="brand-logo">B</span>
        <span class="brand-title">BlogForum</span>
      </a>
    </div>
    
    <div class="nav-search">
      <div class="search-input-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Tìm kiếm trên BlogForum...">
      </div>
    </div>
    
    <div class="nav-auth">
      <ng-container *ngIf="!isLoggedIn">
        <a routerLink="/register" class="btn-secondary">Tải App</a>
        <a class="btn-primary" (click)="openLoginModal()" style="cursor: pointer">Đăng Nhập</a>
      </ng-container>
      
      <ng-container *ngIf="isLoggedIn">
        <a routerLink="/create-post" class="icon-btn" title="Tạo bài viết">➕</a>
        <div class="user-dropdown">
          <div class="user-greeting">👤 {{ username }} ▼</div>
          <div class="dropdown-content">
            <button class="dropdown-item" (click)="logout()">Đăng xuất</button>
          </div>
        </div>
      </ng-container>
    </div>
  </div>
</nav>
